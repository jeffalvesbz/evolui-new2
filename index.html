<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evolui: Planejador de Estudos</title>
    
    <!-- ✅ Novo favicon (adicione /public/favicon.png) -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- ✅ Tailwind processado via PostCSS (sem CDN) -->
    <link rel="stylesheet" href="/src/index.css" />

    <!-- ✅ Fonte Google otimizada -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- ✅ Tema dinâmico mantido -->
    <style>
      :root {
        --color-primary: #8b5cf6;
        --color-secondary: #22d3ee;
        --color-background: #020617;
        --color-foreground: #e2e8f0;
        --color-card: rgba(15, 23, 42, 0.5);
        --color-card-foreground: #e2e8f0;
        --color-muted: #334155;
        --color-muted-foreground: #94a3b8;
        --color-accent: rgba(139, 92, 246, 0.1);
        --color-accent-foreground: #a78bfa;
        --color-border: rgba(255, 255, 255, 0.1);
      }

      .light {
        --color-primary: #7c3aed;
        --color-secondary: #0891b2;
        --color-background: #f8fafc;
        --color-foreground: #0f172a;
        --color-card: rgba(255, 255, 255, 0.6);
        --color-card-foreground: #0f172a;
        --color-muted: #e2e8f0;
        --color-muted-foreground: #64748B;
        --color-accent: #ede9fe;
        --color-accent-foreground: #5b21b6;
        --color-border: rgba(15, 23, 42, 0.1);
      }

      body {
        background-color: var(--color-background);
        color: var(--color-foreground);
        position: relative;
        overflow-x: hidden;
        font-family: 'Inter', sans-serif;
      }

      body::before {
        content: '';
        position: fixed;
        top: -20vh;
        left: -20vw;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(139, 92, 246, 0) 60%);
        border-radius: 50%;
        filter: blur(100px);
        z-index: -1;
        animation: spin-slow 25s linear infinite;
      }

      body::after {
        content: '';
        position: fixed;
        bottom: -10vh;
        right: -10vw;
        width: 40vw;
        height: 40vw;
        background: radial-gradient(circle, rgba(34, 211, 238, 0.15) 0%, rgba(34, 211, 238, 0) 60%);
        border-radius: 50%;
        filter: blur(100px);
        z-index: -1;
        animation: spin-slow 20s linear infinite reverse;
      }

      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .glass-card {
        background-color: var(--color-card);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--color-border);
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- ✅ Build principal do Vite -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
