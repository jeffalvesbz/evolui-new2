  <!-- Fraunces (display/serif hero) + Plus Jakarta Sans (body) + JetBrains Mono (data) -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
            display: ['Fraunces', 'Georgia', 'serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            'primary': 'var(--color-primary)',
            'secondary': 'var(--color-secondary)',
            'background': 'var(--color-background)',
            'foreground': 'var(--color-foreground)',
            'card': 'var(--color-card)',
            'card-foreground': 'var(--color-card-foreground)',
            'muted': 'var(--color-muted)',
            'muted-foreground': 'var(--color-muted-foreground)',
            'accent': 'var(--color-accent)',
            'accent-foreground': 'var(--color-accent-foreground)',
            'border': 'var(--color-border)',
            'input': 'var(--color-input)',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      /* Dark Theme — Nocturnal Scholar: warm black + amber + electric green */
      --color-primary: #F59E0B;        /* amber-400 — lamplight gold */
      --color-secondary: #4ADE80;      /* green-400 — growth/success */
      --color-background: #0C0A06;     /* near-black with warm undertone */
      --color-foreground: #FDF8EE;     /* warm cream */
      --color-card: rgba(22, 18, 8, 0.85);
      --color-card-foreground: #FDF8EE;
      --color-muted: #4A4030;          /* warm muted brown */
      --color-muted-foreground: #A09070; /* warm gray-brown */
      --color-accent: rgba(245, 158, 11, 0.10);
      --color-accent-foreground: #FCD34D; /* amber-300 */
      --color-border: rgba(245, 158, 11, 0.12);
      --color-input: rgba(22, 18, 8, 0.95);
    }

    .light {
      --color-primary: #D97706;        /* amber-600 for light mode */
      --color-secondary: #16A34A;      /* green-600 */
      --color-background: #FDFAF4;     /* warm off-white */
      --color-foreground: #1C1208;     /* near-black warm */
      --color-card: rgba(255, 252, 240, 0.9);
      --color-card-foreground: #1C1208;
      --color-muted: #E8DFC8;
      --color-muted-foreground: #6B5B3E;
      --color-accent: rgba(217, 119, 6, 0.08);
      --color-accent-foreground: #92400E;
      --color-border: rgba(28, 18, 8, 0.10);
      --color-input: rgba(255, 252, 240, 0.98);
    }

    body {
      background-color: var(--color-background);
      color: var(--color-foreground);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20vh;
      left: -10vw;
      width: 55vw;
      height: 55vw;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.12) 0%, rgba(245, 158, 11, 0) 60%);
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      animation: spin-slow 30s linear infinite;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -10vh;
      right: -10vw;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, rgba(74, 222, 128, 0.10) 0%, rgba(74, 222, 128, 0) 60%);
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      animation: spin-slow 22s linear infinite reverse;
    }

    @keyframes spin-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .glass-card {
      background-color: var(--color-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--color-border);
    }

    .clamp-5 {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 5;
      overflow: hidden;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* Mobile: pause background animations to save battery */
    @media (max-width: 768px) {
      body::before,
      body::after {
        animation-play-state: paused;
        filter: blur(60px);
        opacity: 0.06;
      }
    }

    /* Reduced motion: disable all animations */
    @media (prefers-reduced-motion: reduce) {
      body::before,
      body::after {
        animation: none;
      }
    }
  </style>
